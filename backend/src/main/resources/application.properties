# backend/src/main/resources/application.properties
# ─────────────────────────────────────────────────────
# FEIRS — Fingerprint-based Emergency Identity Retrieval System
# Architecture: React → MFS100ClientService (port 8004) for capture
#               React → Spring Boot (port 8080) for enroll / identify
# ─────────────────────────────────────────────────────

spring.application.name=backend

# ── Database ───────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/FEIRS
spring.datasource.username=postgres
spring.datasource.password=0718

# ── JPA ────────────────────────────────────────────────
# create = Hibernate drops and recreates tables on startup (clean-slate for enterprise rebuild)
# SWITCH to 'update' or 'validate' once the 7-table schema stabilizes
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── SQL Init ───────────────────────────────────────────
# Runs schema.sql before Hibernate DDL to drop legacy PoC tables
spring.sql.init.mode=always

# ── Security (disable login page for REST API) ─────────
spring.security.user.name=admin
spring.security.user.password=admin123

# ── BMP save path (where captured fingerprint images are stored) ──
fingerprint.save.path=C:/Users/prash/Documents/Files/Visual Studio Code/Programs/React JS Programs/Fingerprint-based Emergency Identity Retrieval System/captured_fingerprints/

# ── Server ─────────────────────────────────────────────
server.port=8080
